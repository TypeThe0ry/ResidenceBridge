name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: validate gradle wrappers
        uses: gradle/actions/wrapper-validation@v4

      - name: setup jdk 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: make gradle wrappers executable
        run: |
          chmod +x Server/gradlew
          chmod +x Velocity/gradlew

      - name: build server plugin
        working-directory: Server
        run: ./gradlew build -Dkotlin.compiler.execution.strategy=in-process

      - name: build velocity plugin
        working-directory: Velocity
        run: ./gradlew build -Dkotlin.compiler.execution.strategy=in-process

      - name: list build outputs
        run: |
          echo "Server artifacts:"
          ls -lah Server/build/libs/
          echo "Velocity artifacts:"
          ls -lah Velocity/build/libs/

      - name: upload actions artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ResidenceBridge-1.2.0
          path: |
            Server/build/libs/*.jar
            Velocity/build/libs/*.jar
          if-no-files-found: error

      - name: delete old latest release
        if: github.ref == 'refs/heads/main'
        uses: dev-drprasad/delete-tag-and-release@v1.1
        continue-on-error: true
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_release: true

      - name: publish latest release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build
          body: |
            自动构建版本

            Branch: main
            Commit: ${{ github.sha }}
          artifacts: "Server/build/libs/*.jar,Velocity/build/libs/*.jar"
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: publish version release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: "Server/build/libs/*.jar,Velocity/build/libs/*.jar"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          generateReleaseNotes: true