name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrappers
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Read project version
        id: version
        shell: bash
        run: |
          server_version="$(grep '^version=' Server/gradle.properties | cut -d= -f2 | tr -d '\r')"
          velocity_version="$(grep '^version=' Velocity/gradle.properties | cut -d= -f2 | tr -d '\r')"

          if [ -z "$server_version" ] || [ -z "$velocity_version" ]; then
            echo "Missing version in gradle.properties" >&2
            exit 1
          fi

          if [ "$server_version" != "$velocity_version" ]; then
            echo "Version mismatch:" >&2
            echo "Server:   $server_version" >&2
            echo "Velocity: $velocity_version" >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"

            if [ "$tag_version" != "$server_version" ]; then
              echo "Tag version does not match gradle.properties version" >&2
              echo "Tag version:      $tag_version" >&2
              echo "Project version:  $server_version" >&2
              echo "" >&2
              echo "Fix one of them before publishing release." >&2
              exit 1
            fi
          fi

          echo "version=$server_version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $server_version"

      - name: Make Gradle wrappers executable
        shell: bash
        run: |
          chmod +x Server/gradlew
          chmod +x Velocity/gradlew

      - name: Build server plugin
        working-directory: Server
        run: ./gradlew -Dkotlin.compiler.execution.strategy=in-process clean build

      - name: Build velocity plugin
        working-directory: Velocity
        run: ./gradlew -Dkotlin.compiler.execution.strategy=in-process clean build

      - name: Collect artifacts
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"

          mkdir -p dist

          server_jar="Server/build/libs/ResidenceBridge-${version}.jar"
          velocity_jar="Velocity/build/libs/ResidenceBridge-Velocity-${version}.jar"

          if [ ! -f "$server_jar" ]; then
            echo "Missing server jar: $server_jar" >&2
            echo "Available server jars:" >&2
            ls -lah Server/build/libs || true
            exit 1
          fi

          if [ ! -f "$velocity_jar" ]; then
            echo "Missing velocity jar: $velocity_jar" >&2
            echo "Available velocity jars:" >&2
            ls -lah Velocity/build/libs || true
            exit 1
          fi

          cp "$server_jar" dist/
          cp "$velocity_jar" dist/

          echo "Collected artifacts:"
          ls -lah dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ResidenceBridge-${{ steps.version.outputs.version }}-${{ github.run_number }}
          path: dist/*.jar
          if-no-files-found: error

      - name: Publish version release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ResidenceBridge ${{ github.ref_name }}
          body: |
            ResidenceBridge ${{ github.ref_name }}

            ## Artifacts

            - `ResidenceBridge-${{ steps.version.outputs.version }}.jar`
            - `ResidenceBridge-Velocity-${{ steps.version.outputs.version }}.jar`

            ## Build Info

            - Version: `${{ steps.version.outputs.version }}`
            - Tag: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
          artifacts: "dist/*.jar"
          allowUpdates: false
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}